<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOD Admin</title>
<style>
body{background:#111;color:white;font-family:Arial;padding:30px}
.card{background:#1e1e1e;padding:20px;margin:15px 0;border-radius:10px}
input,select,textarea,button{margin:5px;padding:6px}
button{background:#FF6B35;color:white;border:none;cursor:pointer}
.pkg{border:1px solid #333;padding:15px;margin:10px 0;border-radius:8px}
select{background:#222;color:white}
</style>
</head>
<body>

<h1>🐾 MOD FULL ADMIN</h1>

<div class="card">
<h2>Create Package</h2>
<input id="customId" placeholder="Custom Tracking ID (optional)">
<input id="sender" placeholder="Sender">
<input id="senderLocation" placeholder="Sender Location">
<input id="recipientName" placeholder="Recipient Name">
<input id="recipientEmail" placeholder="Recipient Email">
<input id="destination" placeholder="Destination">
<input id="weight" placeholder="Weight">
<input id="description" placeholder="Description">
<button onclick="create()">Create</button>
</div>

<div class="card">
<h2>Packages</h2>
<button onclick="load()">Refresh</button>
<div id="list"></div>
</div>

<script>

const stages = [
  {key:"collected", label:"📦 Collected"},
  {key:"processing", label:"⚙️ Processing"},
  {key:"dispatched", label:"🚀 Dispatched"},
  {key:"in_transit", label:"🚚 In Transit"},
  {key:"out_for_delivery", label:"🐾 Out For Delivery"},
  {key:"delivered", label:"✅ Delivered"},
  {key:"delayed", label:"⚠️ Delayed"},
  {key:"held", label:"🏢 Held At Facility"},
  {key:"customs", label:"🛃 Customs Clearance"},
  {key:"returned", label:"↩️ Returned To Sender"}
];

async function create(){
  await fetch('/api/admin/create',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      customId:customId.value,
      sender:sender.value,
      senderLocation:senderLocation.value,
      recipientName:recipientName.value,
      recipientEmail:recipientEmail.value,
      destination:destination.value,
      weight:weight.value,
      description:description.value
    })
  });
  load();
}

async function load(){
  const res=await fetch('/api/admin/all');
  const data=await res.json();
  list.innerHTML='';

  Object.values(data).forEach(pkg=>{

    let stageOptions = stages.map(s =>
      `<option value="${s.key}" ${pkg.statusKey===s.key?"selected":""}>${s.label}</option>`
    ).join('');

    list.innerHTML+=`
    <div class="pkg">
      <b>${pkg.id}</b><br>
      Current Status: ${pkg.status}<br><br>

      <select id="stage-${pkg.id}">
        ${stageOptions}
      </select>

      <input id="loc-${pkg.id}" placeholder="Update Location">
      <button onclick="updateStage('${pkg.id}')">Update Stage</button>

      <hr>

      <input id="newId-${pkg.id}" placeholder="Change Tracking ID">
      <button onclick="changeId('${pkg.id}')">Change ID</button>

      <hr>

      <textarea id="emailMsg-${pkg.id}" placeholder="Email message"></textarea>
      <button onclick="sendEmail('${pkg.id}')">Send Email</button>

      <hr>

      <button onclick="deletePkg('${pkg.id}')">Delete Package</button>
    </div>`;
  });
}

async function updateStage(id){
  const stageKey=document.getElementById(`stage-${id}`).value;
  const location=document.getElementById(`loc-${id}`).value;
  const stageLabel=stages.find(s=>s.key===stageKey).label;

  await fetch('/api/admin/timeline/'+id,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      status:stageLabel,
      statusKey:stageKey,
      location:location,
      icon:stageLabel.split(" ")[0]
    })
  });

  load();
}

async function changeId(id){
  const newId=document.getElementById(`newId-${id}`).value;
  await fetch('/api/admin/change-id/'+id,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({newId})
  });
  load();
}

async function sendEmail(id){
  const msg=document.getElementById(`emailMsg-${id}`).value;
  await fetch('/api/admin/email/'+id,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      subject:"MOD Update",
      message:msg
    })
  });
}

async function deletePkg(id){
  await fetch('/api/admin/delete/'+id,{method:'DELETE'});
  load();
}

load();

</script>

</body>
</html>
